<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CST8238 Midterm - Interactive Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --correct: #22c55e;
            --incorrect: #ef4444;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 5rem;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .exam-section {
            margin-bottom: 4rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            color: #818cf8;
        }

        .question-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .question-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .q-number {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .q-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #fff;
        }

        .options-grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
        }

        .option.selected {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .option.correct {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--correct);
            color: var(--correct);
        }

        .option.incorrect {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--incorrect);
            color: var(--incorrect);
        }

        .explanation {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--primary);
            border-radius: 0 1rem 1rem 0;
            display: none;
            animation: slideIn 0.4s ease-out;
        }

        pre {
            background: #000;
            padding: 1.5rem;
            border-radius: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            color: #d1d5db;
            margin: 1.5rem 0;
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        code {
            color: #f472b6;
        }

        .btn-reveal {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 100px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: 'Outfit', sans-serif;
            margin-top: 1rem;
        }

        .btn-reveal:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .stats-floating {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 100px;
            border: 1px solid var(--border);
            z-index: 100;
            display: flex;
            gap: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s ease;
            z-index: 1000;
        }

        /* Responsive Improvements */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .container {
                padding: 2rem 1rem;
            }

            .question-card {
                padding: 1.5rem;
            }

            .stats-floating {
                bottom: 1rem;
                right: 1rem;
                padding: 0.8rem 1.2rem;
                gap: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="progress-bar" id="progressBar"></div>

    <div class="stats-floating">
        <div class="stat-item" style="color: var(--correct)">
            <span>✓</span> <span id="correctCount">0</span>
        </div>
        <div class="stat-item" style="color: var(--incorrect)">
            <span>✕</span> <span id="incorrectCount">0</span>
        </div>
        <div class="stat-item" style="color: var(--text-muted)">
            <span id="progressText">0/45</span>
        </div>
    </div>

    <div class="container">
        <header>

            <p class="subtitle">Check if you got your answers right here.</p>

    </div>

                    "There is no difference"
                ],
                answer: 0,
                explanation: "The double equals (==) is loose and tries to force types to match. Triple equals (===) is strict—if the types don't match, it's an immediate 'false'. Always use === to avoid weird bugs!",
                section: "JavaScript Fundamentals"
            },
            {
                q: "Which keyword is used to define a function in JavaScript?",
                options: ["def", "function", "func", "void"],
                answer: 1,
                explanation: "The <code>function</code> keyword followed by a name and parentheses <code>()</code> is the classic way to declare a function in JS. Easy peasy!",
                section: "JavaScript Fundamentals"
            }
        ];

        let userProgress = 0;
        let correctAnswers = 0;
        let incorrectAnswers = 0;
        const answeredQuestions = new Set();

        function renderQuestions() {
            const container = document.getElementById('quizContainer');
            let currentSection = "";

            examData.forEach((data, index) => {
                if (data.section !== currentSection) {
                    currentSection = data.section;
                    const sectionHeader = document.createElement('div');
                    sectionHeader.className = 'exam-section';
                    sectionHeader.innerHTML = `<h2 class="section-title">${currentSection}</h2>`;
                    container.appendChild(sectionHeader);
                }

                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-${index}`;

                let content = `
                    <span class="q-number">Question ${index + 1}</span>
                    <div class="q-text">${data.q}</div>
                `;

                if (data.type === 'code') {
                    content += `<pre><code>${data.code}</code></pre>`;
                }

                content += `<div class="options-grid">`;
                data.options.forEach((opt, optIndex) => {
                    content += `
                        <div class="option" onclick="selectOption(${index}, ${optIndex})">
                            <span style="font-weight:700; margin-right: 1rem; opacity: 0.5">${String.fromCharCode(65 + optIndex)}.</span>
                            ${opt}
                        </div>
                    `;
                });
                content += `</div>`;

                content += `
                    <button class="btn-reveal" onclick="revealAnswer(${index})">Master Explanation</button>
                    <div class="explanation" id="exp-${index}">
                        <div style="font-weight:700; margin-bottom: 0.5rem; color: var(--primary)">THE MASTER'S INSIGHT:</div>
                        ${data.explanation}
                    </div>
                `;

                card.innerHTML = content;
                container.appendChild(card);
            });
        }

        window.selectOption = function (qIndex, optIndex) {
            if (answeredQuestions.has(qIndex)) return;

            const card = document.getElementById(`q-${qIndex}`);
            const options = card.querySelectorAll('.option');
            const data = examData[qIndex];

            options.forEach(opt => opt.classList.remove('selected'));
            options[optIndex].classList.add('selected');

            // Actual functionality for scoring
            if (optIndex === data.answer) {
                options[optIndex].classList.add('correct');
                correctAnswers++;
            } else {
                options[optIndex].classList.add('incorrect');
                options[data.answer].classList.add('correct');
                incorrectAnswers++;
            }

            answeredQuestions.add(qIndex);
            updateStats();
            revealAnswer(qIndex);
        };

        window.revealAnswer = function (index) {
            const exp = document.getElementById(`exp-${index}`);
            exp.style.display = 'block';
            exp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };

        function updateStats() {
            document.getElementById('correctCount').innerText = correctAnswers;
            document.getElementById('incorrectCount').innerText = incorrectAnswers;

            const total = examData.length;
            const current = answeredQuestions.size;
            document.getElementById('progressText').innerText = `${current}/${total}`;

            const percentage = (current / total) * 100;
            document.getElementById('progressBar').style.width = `${percentage}%`;
        }

        // Initialize layout
        document.addEventListener('DOMContentLoaded', renderQuestions);
    </script>
</body>

</html>
